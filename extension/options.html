<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clip-Direct – Settings</title>
  <style>
    body { font: 14px system-ui, sans-serif; max-width: 520px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, select { width: 100%; margin-top: 4px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 10px 16px; }
    .saved { color: green; margin-left: 8px; }
    p.note { color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <h1 data-i18n="options.title"></h1>
  <p class="note" data-i18n="options.noteDefault"></p>
  <label data-i18n="options.language"></label>
  <select id="uiLocale">
    <option value="en" data-i18n="options.lang.en"></option>
    <option value="de" data-i18n="options.lang.de"></option>
  </select>
  <label data-i18n="options.serverUrl"></label>
  <input type="url" id="clipDirectBaseUrl" placeholder="http://localhost:8090/" />
  <p class="note" data-i18n="options.serverNote"></p>
  <label data-i18n="options.saveTarget"></label>
  <select id="saveTarget">
    <option value="browser" data-i18n="options.saveBrowser"></option>
    <option value="nas" data-i18n="options.saveNas"></option>
  </select>
  <label data-i18n="options.nasFolder"></label>
  <input type="text" id="folder" placeholder="" />
  <label data-i18n="options.downloadType"></label>
  <select id="downloadType">
    <option value="video" data-i18n="options.typeVideo"></option>
    <option value="audio" data-i18n="options.typeAudio"></option>
  </select>
  <label data-i18n="options.format"></label>
  <input type="text" id="format" value="any" />
  <label data-i18n="options.openUiAfterQueue"></label>
  <select id="openUiAfterQueue">
    <option value="false" data-i18n="options.openUiNo"></option>
    <option value="true" data-i18n="options.openUiYes"></option>
  </select>
  <button type="button" id="save" data-i18n="options.save"></button><span id="saved" class="saved" hidden data-i18n="options.saved"></span>
  <button type="button" id="openUi" style="margin-left:8px" data-i18n="options.openWebUi"></button>
  <script type="module" src="options.js"></script>
</body>
</html>
